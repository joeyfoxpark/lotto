name: 주간 자동 업데이트

on:
  schedule:
    # 매주 토요일 13:00 UTC = 한국시각(KST) 토 22:00 (추첨 20:40 이후)
    # (GitHub 사정으로 수십 분 늦게 실행될 수 있음)
    - cron: '0 13 * * 6'
  workflow_dispatch:   # 수동 실행도 가능

permissions:
  contents: write   # 갱신된 데이터·사이트(docs/) 커밋 → Pages 자동 게시

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests korean_lunar_calendar

      - name: 새 회차 당첨번호 수집
        run: python collector/collect_lotto.py

      - name: 최근 회차 판매점 수집 (실패해도 진행)
        run: |
          python collector/collect_stores.py 1 1200 99999 || true
          python collector/collect_stores.py 2 1200 99999 || true

      - name: 데이터 · HTML(docs/) 재생성
        run: |
          python web_static/build_data.py
          python web_static/build_html.py

      - name: 변경사항 커밋 & 푸시 (→ GitHub Pages 자동 게시)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "변경 없음 (이미 최신)"
          else
            git commit -m "자동 업데이트: 최신 회차 반영"
            git push
          fi
