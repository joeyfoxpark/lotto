name: 동행복권 접속 테스트

# 수동 실행 전용 (Actions 탭에서 Run workflow)
on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: 동행복권 접근 진단
        run: python tools/ping_dhlottery.py
